name: Passport Slot Checker

on:
  schedule:
    - cron: "0 0-10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Ensure state file exists
        run: |
          if [ ! -f state.json ]; then
            echo '{"last_result":{"current":false,"next":false}}' > state.json
          fi

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Commit updated state (clean history)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state.json

          # 🚨 Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "🟡 No changes in state.json → skipping commit"
            exit 0
          fi

          git commit -m "Update bot state [skip ci]"

          # safer push (avoids conflicts)
          git pull --rebase origin main
          git push origin main